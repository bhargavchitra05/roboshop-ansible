- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: "sg-009a1cf6c0bb3b31b"
    ami_id: "ami-0220d79f3f480ecf5"
    env: "dev"
    instances:
      - mongodb
      - catalogue

  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        instance_type: "t2.micro"
        image_id: "{{ ami_id }}"
        name: "{{ item }}-{{ env }}"
        tags:
          project: "roboshop"
          component: "{{ item }}"
          Environment: "{{ env }}"
          Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_output

    - name: print the output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"